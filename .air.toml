root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/server"
  cmd = "go build -buildvcs=false -trimpath -o ./tmp/server ./cmd/server"
  delay = 200
  poll = true
  poll_interval = 750
  exclude_dir = ["tmp", "vendor", ".git", "dist"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "mod", "sum", "toml"]
  kill_delay = "1s"
  send_interrupt = true

[log]
  time = true

[misc]
  clean_on_exit = true
